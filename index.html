<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display README</title>
    <!-- Include Marked library to parse Markdown into HTML -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            color: #24292e;
        }
        #readme-container {
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            padding: 32px;
            background-color: #ffffff;
        }
        pre {
            background-color: #f6f8fa;
            padding: 16px;
            border-radius: 6px;
            overflow: auto;
        }
        code {
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            background-color: rgba(27,31,35,0.05);
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-size: 85%;
        }
        pre code {
            background-color: transparent;
            padding: 0;
        }
    </style>
</head>
<body>

    <div id="readme-container">Loading README...</div>

    <script>
        // Path to your local README file, or a public remote URL
        const readmeUrl = 'README.md'; 

        async function displayReadme() {
            try {
                const response = await fetch(readmeUrl);
                if (!response.ok) {
                    throw new Error('Could not fetch the README file.');
                }
                const markdownText = await response.text();
                
                // Convert Markdown to HTML and inject it into the container
                document.getElementById('readme-container').innerHTML = marked.parse(markdownText);
            } catch (error) {
                document.getElementById('readme-container').innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }

        // Run the function when the page loads
        displayReadme();
    </script>

</body>
</html>
